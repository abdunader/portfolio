<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdelrahman Nader About</title>
    <link
      id="favicon"
      rel="icon"
      type="image/png"
      href="./assets/images/logo_white.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="./css/index.css" />
  </head>

  <body data-page="about">
    <div id="site-sidebar"></div>
    <div class="main-content container pt-3">
      <div id="site-nav"></div>

      <main class="mt-5 pt-lg-5 pb-5 about-page-main">
        <div
          class="about-page-decoration about-page-decoration--top-right d-none d-lg-block"
          data-shape="dotGrid"></div>
        <div
          class="about-page-decoration about-page-decoration--mid-left d-none d-lg-block"
          data-shape="dotGrid"></div>
        <div
          class="about-page-decoration about-page-decoration--bottom-right d-none d-lg-block"
          data-shape="squareOutline"></div>

        <section class="mb-5 pb-lg-5">
          <div class="row align-items-center gy-5">
            <div class="col-12 col-lg-6">
              <h1 class="fw-bold m-0" style="font-size: 2rem">
                <span class="text-primary">/</span>about-me
              </h1>
              <p class="page-eyebrow fw-bold mt-3">Who am I?</p>
              <div id="about-intro" class="about-page-copy mt-5"></div>
              <div class="d-flex flex-wrap gap-3 mt-4">
                <a href="./projects.html" class="btn btn-primary-outline"
                  >View Projects</a
                >
                <a href="./contact.html" class="btn btn-secondary-outline"
                  >Contact Me</a
                >
              </div>
            </div>

            <div class="col-12 col-lg-6 justify-content-center d-flex">
              <div class="about-hero-visual">
                <div class="about-hero-frame">
                  <div
                    class="about-floating-grid about-floating-grid--left"
                    data-shape="dotGrid"></div>
                  <img
                    src="./assets/images/about.png"
                    alt="Abdelrahman Nader"
                    class="about-page-img ms-auto img-fluid" />
                  <div
                    class="about-floating-grid about-floating-grid--right"
                    data-shape="dotGrid"></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section id="skills" class="mb-5 py-lg-5">
          <div class="d-flex align-items-center mb-5">
            <h2 class="section-title fw-bold m-0">
              <span class="text-primary">#</span>skills
            </h2>
            <div
              class="d-none d-md-block flex-grow-1 ms-3 bg-primary"
              style="height: 1px; max-width: 260px"></div>
          </div>

          <div class="row g-3" id="skills-grid"></div>
        </section>

        <section class="py-lg-5 about-facts-section">
          <div class="row align-items-start gy-5">
            <div class="col-12 col-lg-7">
              <div class="d-flex align-items-center mb-5">
                <h2 class="section-title fw-bold m-0">
                  <span class="text-primary">#</span>my-fun-facts
                </h2>
              </div>

              <div class="row g-3" id="about-highlights"></div>
            </div>

            <div class="col-12 col-lg-5 d-flex justify-content-center">
              <div class="about-facts-visual">
                <div
                  class="about-facts-shape about-facts-shape--grid-top"
                  data-shape="dotGrid"></div>
                <div
                  class="about-facts-shape about-facts-shape--grid-bottom"
                  data-shape="dotGrid"></div>
                <div
                  class="about-facts-shape about-facts-shape--square-back"
                  data-shape="squareOutline"></div>
                <div
                  class="about-facts-shape about-facts-shape--square-front"
                  data-shape="squareOutline"></div>
                <img
                  src="./assets/images/logo.png"
                  alt="Abdelrahman logo"
                  class="about-facts-logo logo" />
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <footer class="site-footer py-4">
      <div class="container">
        <div
          class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-4">
          <div>
            <div class="d-flex align-items-center gap-2 mb-2">
              <img
                src="./assets/images/logo.png"
                alt="Logo"
                height="24"
                class="logo" />
              <span class="fw-bold">Abdelrahman</span>
            </div>
            <p class="text-secondary-light mb-0">
              Front-end developer crafting responsive web experiences.
            </p>
          </div>

          <div>
            <h5 class="mb-3">Media</h5>
            <div id="footer-social-links" class="d-flex gap-3"></div>
          </div>
        </div>
        <p class="text-center text-secondary-light small mb-0 mt-4">
          &copy; <span id="footer-year"></span> Abdelrahman Nader. All rights
          reserved.
        </p>
      </div>
    </footer>

    <button
      id="back-to-top"
      class="btn btn-primary-outline back-to-top-btn"
      type="button"
      aria-label="Back to top">
      <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./data/social-links.js"></script>
    <script src="./data/skills.js"></script>
    <script src="./data/about.js"></script>
    <script src="./data/shapes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js"></script>
    <script src="./js/layout.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
