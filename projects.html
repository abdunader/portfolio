<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdelrahman Nader Projects</title>
    <!-- Favicon -->
    <link
      id="favicon"
      rel="icon"
      type="image/png"
      href="./assets/images/logo_white.png"
    />
    <!-- Google Fonts: Fira Code -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/index.css" />
  </head>

  <body>
    <!-- Social Sidebar -->
    <div class="social-sidebar d-none d-lg-flex flex-column align-items-center">
      <div class="sidebar-line"></div>
      <!-- Social icons rendered from data/social-links.js -->
      <div
        id="social-sidebar-links"
        class="d-flex flex-column align-items-center"
      ></div>
    </div>
    <div
      class="social-sidebar-box d-none d-lg-block"
      data-shape="squareOutline"
    ></div>

    <div class="main-content container pt-3">
      <!-- Navigation -->
      <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container-fluid px-0">
          <a
            class="navbar-brand d-flex align-items-center gap-2"
            href="./index.html"
          >
            <img
              src="./assets/images/logo.png"
              alt="Logo"
              height="30"
              class="logo"
            />
            <span class="font-weight-bold">Abdelrahman</span>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#navbarContent"
            aria-controls="navbarContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="offcanvas-lg offcanvas-top w-100 h-100 border-0"
            id="navbarContent"
            tabindex="-1"
          >
            <div
              class="offcanvas-body p-0 d-flex flex-column flex-lg-row align-items-lg-center overflow-hidden"
            >
              <!-- Mobile Menu Header -->
              <div
                class="w-100 d-flex justify-content-between align-items-center d-lg-none pb-5 pt-4 px-4"
              >
                <a
                  class="navbar-brand d-flex align-items-center gap-2 m-0"
                  href="./index.html"
                >
                  <img
                    src="./assets/images/logo.png"
                    alt="Logo"
                    height="30"
                    class="logo"
                  />
                  <span class="font-weight-bold">Abdelrahman</span>
                </a>
                <button
                  class="btn btn-link text-white p-0 text-decoration-none"
                  type="button"
                  data-bs-dismiss="offcanvas"
                  data-bs-target="#navbarContent"
                >
                  <i class="fa-solid fa-xmark fs-2 text-secondary-light"></i>
                </button>
              </div>

              <ul
                class="navbar-nav ms-lg-auto mb-2 mb-lg-0 align-items-start align-items-lg-center gap-3 px-4 px-lg-0"
              >
                <li class="nav-item">
                  <a
                    class="nav-link"
                    aria-current="page"
                    href="./index.html#home"
                    ><span class="text-primary">#</span>home</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link active" href="./projects.html"
                    ><span class="text-primary">#</span>projects</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="./index.html#about-me"
                    ><span class="text-primary">#</span>about-me</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="./index.html#contact"
                    ><span class="text-primary">#</span>contact</a
                  >
                </li>
                <!-- Theme toggle -->
                <li class="nav-item ms-lg-2 ms-0 mt-4 mt-lg-0">
                  <button
                    id="theme-toggle"
                    class="btn btn-link nav-link px-0 px-lg-2 d-flex align-items-center"
                    aria-label="Toggle theme"
                  >
                    <i
                      id="theme-icon"
                      class="fa-solid fa-sun mobile-theme-icon"
                    ></i>
                  </button>
                </li>
              </ul>

              <!-- Mobile Social Icons Footer -->
              <!-- Social icons rendered from data/social-links.js -->
              <div
                class="mt-auto d-flex justify-content-center gap-4 w-100 d-lg-none pb-5"
                id="social-mobile-links"
              ></div>
            </div>
          </div>
        </div>
      </nav>

      <!-- Page Header -->
      <main class="mt-5 pt-lg-5 mb-5 pb-3">
        <h1 class="fw-bold m-0" style="font-size: 2rem">
          <span class="text-primary">/</span>projects
        </h1>
        <p class="text-secondary-light mt-2" style="font-size: 1rem">
          List of my projects
        </p>
      </main>

      <!-- Complete Apps Section -->
      <section id="complete-apps" class="mb-5 pb-5">
        <div class="d-flex align-items-center mb-5">
          <h2 class="section-title fw-bold m-0">
            <span class="text-primary">#</span>complete-apps
          </h2>
        </div>
        <div class="row g-3" id="complete-apps-grid">
          <!-- Complete App cards are rendered dynamically -->
        </div>
      </section>

      <!-- Small Projects Section -->
      <section id="small-projects" class="mb-5 pb-5">
        <div class="d-flex align-items-center mb-5">
          <h2 class="section-title fw-bold m-0">
            <span class="text-primary">#</span>small-projects
          </h2>
        </div>
        <div class="row g-3" id="small-projects-grid">
          <!-- Small project cards are rendered dynamically -->
        </div>
      </section>
    </div>

    <!-- Footer Section -->
    <footer class="site-footer py-4">
      <div class="container">
        <div
          class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-4"
        >
          <div>
            <div class="d-flex align-items-center gap-2 mb-2">
              <img
                src="./assets/images/logo.png"
                alt="Logo"
                height="24"
                class="logo"
              />
              <span class="fw-bold">Abdelrahman</span>
            </div>
            <p class="text-secondary-light mb-0">
              Front-end developer crafting responsive web experiences.
            </p>
          </div>

          <div>
            <h5 class="mb-3">Media</h5>
            <div id="footer-social-links" class="d-flex gap-3"></div>
          </div>
        </div>
        <p class="text-center text-secondary-light small mb-0 mt-4">
          &copy; <span id="footer-year"></span> Abdelrahman Nader. All rights
          reserved.
        </p>
      </div>
    </footer>

    <button
      id="back-to-top"
      class="btn btn-primary-outline back-to-top-btn"
      type="button"
      aria-label="Back to top"
    >
      <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Project Data -->
    <script src="./data/projects.js"></script>
    <!-- Social Links Data -->
    <script src="./data/social-links.js"></script>
    <!-- Skills Data -->
    <script src="./data/skills.js"></script>
    <!-- Shape SVGs -->
    <script src="./data/shapes.js"></script>
    <!-- Quotes Data -->
    <script src="./data/quotes.js"></script>
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- Custom JS -->
    <script src="./js/index.js"></script>
  </body>
</html>
