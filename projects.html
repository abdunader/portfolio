<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdelrahman Nader Projects</title>
    <!-- Favicon -->
    <link
      id="favicon"
      rel="icon"
      type="image/png"
      href="./assets/images/logo_white.png"
    />
    <!-- Google Fonts: Fira Code -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/index.css" />
  </head>

  <body data-page="projects">
    <div id="site-sidebar"></div>
    <div class="main-content container pt-3">
      <!-- Static Random Shapes -->
      <div
        class="random-shape d-none d-lg-block"
        data-shape="dotGrid"
        style="width: 85px; height: 85px; top: 12%; left: 8%; opacity: 0.5"
      ></div>
      <div
        class="random-shape d-none d-lg-block"
        data-shape="squareOutline"
        style="width: 50px; height: 50px; top: 45%; right: -10%; opacity: 0.7"
      ></div>
      <div
        class="random-shape d-none d-lg-block"
        data-shape="dotGrid"
        style="width: 65px; height: 65px; top: 58%; left: 12%; opacity: 0.65"
      ></div>
      <div
        class="random-shape d-none d-lg-block"
        data-shape="squareOutline"
        style="width: 200px; height: 200px; top: 85%; left: -10%; opacity: 0.75"
      ></div>
      <div
        class="random-shape d-none d-lg-block"
        data-shape="dotGrid"
        style="width: 110px; height: 110px; top: 75%; right: -15%; opacity: 1"
      ></div>

      <div id="site-nav"></div>

      <!-- Page Header -->
      <main class="mt-5 pt-lg-5 mb-5 pb-3">
        <h1 class="fw-bold m-0" style="font-size: 2rem">
          <span class="text-primary">/</span>projects
        </h1>
        <p class="text-secondary-light mt-2" style="font-size: 1rem">
          List of my projects
        </p>
      </main>

      <!-- Complete Apps Section -->
      <section id="complete-apps" class="mb-5 pb-5">
        <div class="d-flex align-items-center mb-5">
          <h2 class="section-title fw-bold m-0">
            <span class="text-primary">#</span>complete-apps
          </h2>
        </div>
        <div class="row g-3" id="complete-apps-grid">
          <!-- Complete App cards are rendered dynamically -->
        </div>
      </section>

      <!-- Small Projects Section -->
      <section id="small-projects" class="mb-5 pb-5">
        <div class="d-flex align-items-center mb-5">
          <h2 class="section-title fw-bold m-0">
            <span class="text-primary">#</span>small-projects
          </h2>
        </div>
        <div class="row g-3" id="small-projects-grid">
          <!-- Small project cards are rendered dynamically -->
        </div>
      </section>
    </div>

    <!-- Footer Section -->
    <footer class="site-footer py-4">
      <div class="container">
        <div
          class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-4"
        >
          <div>
            <div class="d-flex align-items-center gap-2 mb-2">
              <img
                src="./assets/images/logo.png"
                alt="Logo"
                height="24"
                class="logo"
              />
              <span class="fw-bold">Abdelrahman</span>
            </div>
            <p class="text-secondary-light mb-0">
              Front-end developer crafting responsive web experiences.
            </p>
          </div>

          <div>
            <h5 class="mb-3">Media</h5>
            <div id="footer-social-links" class="d-flex gap-3"></div>
          </div>
        </div>
        <p class="text-center text-secondary-light small mb-0 mt-4">
          &copy; <span id="footer-year"></span> Abdelrahman Nader. All rights
          reserved.
        </p>
      </div>
    </footer>

    <button
      id="back-to-top"
      class="btn btn-primary-outline back-to-top-btn"
      type="button"
      aria-label="Back to top"
    >
      <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Project Data -->
    <script src="./data/projects.js"></script>
    <!-- Social Links Data -->
    <script src="./data/social-links.js"></script>
    <!-- Skills Data -->
    <script src="./data/skills.js"></script>
    <!-- Shape SVGs -->
    <script src="./data/shapes.js"></script>
    <!-- Quotes Data -->
    <script src="./data/quotes.js"></script>
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- Masonry Layout -->
    <script src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js"></script>
    <script src="./js/layout.js"></script>
    <!-- Custom JS -->
    <script src="./js/index.js"></script>
  </body>
</html>
