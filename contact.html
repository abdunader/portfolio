<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdelrahman Nader Contact</title>
    <link
      id="favicon"
      rel="icon"
      type="image/png"
      href="./assets/images/logo_white.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="./css/index.css" />
  </head>

  <body>
    <div class="social-sidebar d-none d-lg-flex flex-column align-items-center">
      <div class="sidebar-line"></div>
      <div
        id="social-sidebar-links"
        class="d-flex flex-column align-items-center"></div>
    </div>
    <div
      class="social-sidebar-box d-none d-lg-block"
      data-shape="squareOutline"></div>

    <div class="main-content container pt-3">
      <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container-fluid px-0">
          <a
            class="navbar-brand d-flex align-items-center gap-2"
            href="./index.html">
            <img
              src="./assets/images/logo.png"
              alt="Logo"
              height="30"
              class="logo" />
            <span class="font-weight-bold">Abdelrahman</span>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#navbarContent"
            aria-controls="navbarContent"
            aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="offcanvas-lg offcanvas-top w-100 h-100 border-0"
            id="navbarContent"
            tabindex="-1">
            <div
              class="offcanvas-body p-0 d-flex flex-column flex-lg-row align-items-lg-center overflow-hidden">
              <div
                class="w-100 d-flex justify-content-between align-items-center d-lg-none pb-5 pt-4 px-4">
                <a
                  class="navbar-brand d-flex align-items-center gap-2 m-0"
                  href="./index.html">
                  <img
                    src="./assets/images/logo.png"
                    alt="Logo"
                    height="30"
                    class="logo" />
                  <span class="font-weight-bold">Abdelrahman</span>
                </a>
                <button
                  class="btn btn-link text-white p-0 text-decoration-none"
                  type="button"
                  data-bs-dismiss="offcanvas"
                  data-bs-target="#navbarContent">
                  <i class="fa-solid fa-xmark fs-2 text-secondary-light"></i>
                </button>
              </div>

              <ul
                class="navbar-nav ms-lg-auto mb-2 mb-lg-0 align-items-start align-items-lg-center gap-3 px-4 px-lg-0">
                <li class="nav-item">
                  <a class="nav-link" href="./index.html#home"
                    ><span class="text-primary">#</span>home</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="./projects.html"
                    ><span class="text-primary">#</span>projects</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="./about.html"
                    ><span class="text-primary">#</span>about-me</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link active" href="./contact.html"
                    ><span class="text-primary">#</span>contact</a
                  >
                </li>
                <li class="nav-item ms-lg-2 ms-0 mt-4 mt-lg-0">
                  <button
                    id="theme-toggle"
                    class="btn btn-link nav-link px-0 px-lg-2 d-flex align-items-center"
                    aria-label="Toggle theme">
                    <i
                      id="theme-icon"
                      class="fa-solid fa-sun mobile-theme-icon"></i>
                  </button>
                </li>
              </ul>

              <div
                class="mt-auto d-flex justify-content-center gap-4 w-100 d-lg-none pb-5"
                id="social-mobile-links"></div>
            </div>
          </div>
        </div>
      </nav>

      <main class="mt-5 pt-lg-5 pb-5 contact-page-main">
        <!-- <div
          class="contact-page-decoration contact-page-decoration--top-right d-none d-lg-block"
          data-shape="dotGrid"></div> -->
        <div
          class="contact-page-decoration contact-page-decoration--mid-left d-none d-lg-block"
          data-shape="dotGrid"></div>

        <section class="mb-5 pb-lg-4">
          <h1 class="fw-bold m-0" style="font-size: 2rem">
            <span class="text-primary">/</span>contacts
          </h1>
          <div class="row gy-5 align-items-start">
            <div class="col-12 col-lg-6">
              <p id="contact-page-eyebrow" class="page-eyebrow fw-bold mt-3">
                How to reach me
              </p>
              <div id="contact-page-intro" class="contact-page-copy mt-5"></div>
            </div>

            <div class="col-12 col-lg-6">
              <div id="all-media-links" class="all-media-list"></div>
            </div>
          </div>
        </section>

        <section class="py-lg-5">
          <div class="d-flex align-items-center mb-4">
            <h2 class="section-title fw-bold m-0">
              <span class="text-primary">#</span>message-me
            </h2>
          </div>
          <div class="row gy-5 align-items-start">
            <div class="col-12 col-lg-7">
              <form
                id="contact-form"
                class="contact-form contact-page-form ms-lg-auto"
                action="#"
                method="post"
                novalidate>
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <input
                      id="contact-name"
                      type="text"
                      class="contact-input"
                      name="name"
                      placeholder="Name"
                      aria-label="Name"
                      required
                      minlength="2"
                      maxlength="80"
                      autocomplete="name" />
                  </div>
                  <div class="col-12 col-md-6">
                    <input
                      id="contact-email"
                      type="email"
                      class="contact-input"
                      name="email"
                      placeholder="Email"
                      aria-label="Email"
                      required
                      maxlength="120"
                      autocomplete="email" />
                  </div>
                  <div class="col-12">
                    <input
                      id="contact-title"
                      type="text"
                      class="contact-input"
                      name="title"
                      placeholder="Project title"
                      aria-label="Project title"
                      required
                      minlength="3"
                      maxlength="120" />
                  </div>
                  <div class="col-12">
                    <textarea
                      id="contact-message"
                      class="contact-input contact-textarea"
                      name="message"
                      placeholder="Tell me about your project"
                      aria-label="Message"
                      required
                      minlength="10"
                      maxlength="1500"></textarea>
                  </div>
                  <div class="col-12 contact-honeypot" aria-hidden="true">
                    <input
                      id="contact-company"
                      type="text"
                      class="contact-input"
                      name="company"
                      tabindex="-1"
                      autocomplete="off"
                      placeholder="Company" />
                  </div>
                  <div class="col-12 d-flex flex-wrap gap-3 align-items-center">
                    <button
                      id="contact-submit-btn"
                      type="submit"
                      class="btn btn-primary-outline contact-submit-btn">
                      Send
                    </button>
                    <p
                      id="contact-form-status"
                      class="contact-form-status mb-0"
                      role="status"
                      aria-live="polite"></p>
                  </div>
                </div>
              </form>
            </div>

            <div class="col-12 col-lg-5">
              <article class="hire-platforms-card">
                <h2 class="hire-platforms-card__title fw-bold">Hire me on</h2>
                <div id="freelance-links" class="hire-platforms-list"></div>
              </article>
            </div>
          </div>
        </section>
      </main>
    </div>

    <footer class="site-footer py-4">
      <div class="container">
        <div
          class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-4">
          <div>
            <div class="d-flex align-items-center gap-2 mb-2">
              <img
                src="./assets/images/logo.png"
                alt="Logo"
                height="24"
                class="logo" />
              <span class="fw-bold">Abdelrahman</span>
            </div>
            <p class="text-secondary-light mb-0">
              Front-end developer crafting responsive web experiences.
            </p>
          </div>

          <div>
            <h5 class="mb-3">Media</h5>
            <div id="footer-social-links" class="d-flex gap-3"></div>
          </div>
        </div>
        <p class="text-center text-secondary-light small mb-0 mt-4">
          &copy; <span id="footer-year"></span> Abdelrahman Nader. All rights
          reserved.
        </p>
      </div>
    </footer>

    <button
      id="back-to-top"
      class="btn btn-primary-outline back-to-top-btn"
      type="button"
      aria-label="Back to top">
      <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./data/social-links.js"></script>
    <script src="./data/contact.js"></script>
    <script src="./data/shapes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
